services:
  postgres:
    image: postgres:17-alpine
    container_name: hangrix-zip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hangrix
      POSTGRES_PASSWORD: hangrix
      POSTGRES_DB: hangrix
    volumes:
      - ./.runtime/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hangrix -d hangrix"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: hangrix-zip-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.runtime/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  hangrix:
    build:
      context: .
      dockerfile: Dockerfile.hangrix
    image: hangrix-zip:local
    container_name: hangrix-zip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:18081:8080"
    volumes:
      - ./.runtime/app:/data
    environment:
      API_SERVER_ADDR: ":8080"
      API_SERVER_URL: "http://host.docker.internal:18081"
      API_DATABASE_DSN: "postgres://hangrix:hangrix@postgres:5432/hangrix?sslmode=disable"
      API_REDIS_ADDR: "redis:6379"
      API_STORAGE_REPOS_PATH: "/data/repos"
      API_STORAGE_ASSETS_PATH: "/data/assets"
      API_STORAGE_ATTACHMENTS_PATH: "/data/attachments"
