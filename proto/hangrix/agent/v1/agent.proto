// hangrix.agent.v1 is the wire contract the in-container agent speaks
// with the platform. Replaces the ad-hoc JSON-over-HTTP `/api/agent/
// sessions/{id}/*` surface that lived in agent_direct.go + http_transport.go.
//
// Design notes:
//
//   - Each RPC has dedicated Request / Response messages (buf lint
//     STANDARD requirement). The polymorphic event/control variants
//     are modelled as `oneof body` inside StreamInputsResponse.
//
//   - Streaming. StreamInputs is server-streaming: the server pushes
//     one StreamInputsResponse per platform-enqueued frame. The agent
//     closes the stream when it's ready to exit; the server closes
//     with OK when it terminates the wake (admin shutdown, repo
//     archive). Replaces the previous 20-s long-poll loop and its
//     5-minute client-side idle-grace timer.
//
//   - JSON payload escape hatches. EventFrame.payload, ToolCallFrame.
//     args, ToolCallFrame.result stay as `bytes` carrying raw JSON.
//     Event payloads are event-name-specific and change too often to
//     bind into proto; tool args/results are LLM-shaped JSON we never
//     introspect server-side. Wrapping them in google.protobuf.Struct
//     would force a full re-marshal at every hop for zero benefit.
//
//   - Session identity. Every request carries `session_id` even though
//     the bearer token already pins it. Server-side bearer middleware
//     enforces `request.session_id == token.session_id` so a leaked
//     token can't address a different session's queue.
syntax = "proto3";

package hangrix.agent.v1;

// ---- Shared value types ------------------------------------------------

// HistoryItem is one replayed message in the seed history. Mirrors the
// agent loop's flattened (role, kind, content, tool_calls) shape.
message HistoryItem {
  // Role: "user" | "assistant" | "tool" | "system".
  string role = 1;
  // Optional sub-tag the loop branches on, e.g. "event" or "summary".
  string kind = 2;
  // Populated when kind=="event": the original event name.
  string event = 3;
  string content = 4;
  repeated ToolCall tool_calls = 5;
  // Populated when role=="tool": pairs the tool result back to the
  // assistant(tool_calls) that called it.
  string tool_call_id = 6;
}

// ToolCall is one LLM-emitted function call. `arguments` is raw JSON
// text (string, not bytes) because the OpenAI function-calling spec
// expects it that way on the wire and downstream dispatchers
// round-trip it unchanged.
message ToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3;
}

// EventFrame carries a platform trigger the agent should react to.
// `event` is the trigger name ("issue.comment", "commit.pushed", etc.);
// `payload` is the event-specific JSON body the rendering layer parses.
message EventFrame {
  string event = 1;
  bytes payload = 2;
}

// ControlFrame is a server-pushed runtime signal. Reserved for future
// graceful-shutdown / suspend / resume delivery; today only emitted by
// admin paths. Agents that don't recognise an op log it and ignore.
message ControlFrame {
  enum Op {
    OP_UNSPECIFIED = 0;
    OP_SHUTDOWN = 1;
    OP_SUSPEND = 2;
    OP_RESUME = 3;
  }
  Op op = 1;
  // Reason / expected_exit_at populate ONLY on OP_SUSPEND so the agent
  // can surface why it's paused and (for schedule-based silence) when
  // it expects to resume. RFC 3339 timestamp.
  string reason = 2;
  string expected_exit_at = 3;
}

// Outbound is one frame the agent emits. Persisted to the session
// message log by AppendMessage. Unlike the legacy stdin/stdout model
// there is no Outbound idle variant — the per-turn idle signal was
// runner-relay-only; the agent-process-done signal now fires via the
// MarkIdle RPC, exactly once.
message Outbound {
  oneof body {
    StatusFrame status = 1;
    LogFrame log = 2;
    MessageFrame message = 3;
    ToolCallFrame tool_call = 4;
    DoneFrame done = 5;
  }
}

// StatusFrame surfaces the agent's high-level phase ("ready",
// "thinking", "tool"). Optional `expected_exit_at` carries the silence
// schedule's resume time on phase=="suspended".
message StatusFrame {
  string phase = 1;
  string expected_exit_at = 2;
}

message LogFrame {
  string level = 1;
  string message = 2;
}

// MessageFrame is one assistant turn. `tool_calls` is populated when
// the LLM emitted a function-call batch.
message MessageFrame {
  string role = 1;
  string content = 2;
  repeated ToolCall tool_calls = 3;
}

// ToolCallFrame is one tool execution result. Persisted alongside the
// preceding MessageFrame(tool_calls) so the audit + replay path can
// reconstruct the assistant(tool_calls) → tool(result) pairing the
// LLM API requires.
message ToolCallFrame {
  string id = 1;
  string name = 2;
  bytes args = 3;
  bytes result = 4;
}

// DoneFrame marks the end of one turn (event → idle round-trip).
// turn_id correlates with the tool-call set so audit views can group
// related messages even when multiple turns interleave under burst.
message DoneFrame {
  string turn_id = 1;
}

// ---- Service -----------------------------------------------------------

service AgentService {
  // FetchHistory returns the seed history the agent reads at boot to
  // rebuild its LLM context. Called exactly once per agent process
  // before opening the StreamInputs subscription. Server replays the
  // session message log faithfully so a rewake restores context as it
  // was when the previous wake exited.
  rpc FetchHistory(FetchHistoryRequest) returns (FetchHistoryResponse);

  // StreamInputs subscribes the agent to the session inputs queue.
  // The server pushes one StreamInputsResponse per event as the
  // platform enqueues them; idle periods are silent (no keepalive
  // frames). Stream close semantics:
  //   - Agent-initiated close: agent is exiting (idle window elapsed).
  //   - Server-initiated close with OK: wake terminated by the
  //     platform (admin shutdown, issue archive).
  //   - Server-initiated close with error: protocol failure; agent
  //     fails the session and exits.
  rpc StreamInputs(StreamInputsRequest) returns (stream StreamInputsResponse);

  // AppendMessage persists one Outbound frame to the session message
  // log. Calls are serialised by the caller — the server appends in
  // arrival order, so concurrent calls would race and corrupt the
  // assistant(tool_calls) → tool(result) pairing.
  rpc AppendMessage(AppendMessageRequest) returns (AppendMessageResponse);

  // MarkIdle flips agent_sessions.status to 'idle'. The agent fires it
  // exactly once, in Loop.Run's defer, right before the process exits.
  // The spawner reads the resulting idle status to route the next
  // trigger through the rewake path (fresh workflow_run) rather than
  // enqueueOntoLive (which would try to push to a dead container).
  rpc MarkIdle(MarkIdleRequest) returns (MarkIdleResponse);
}

message FetchHistoryRequest {
  int64 session_id = 1;
}

message FetchHistoryResponse {
  repeated HistoryItem messages = 1;
}

message StreamInputsRequest {
  int64 session_id = 1;
}

// StreamInputsResponse is one item in the stream. Exactly one of the
// body variants is populated. New variants can be appended without
// breaking older clients — they fall through to the default branch
// and log "unknown frame" rather than crashing.
message StreamInputsResponse {
  oneof body {
    EventFrame event = 1;
    ControlFrame control = 2;
  }
}

message AppendMessageRequest {
  int64 session_id = 1;
  Outbound frame = 2;
}

message AppendMessageResponse {}

message MarkIdleRequest {
  int64 session_id = 1;
  // Informational hint surfacing how many background bash tasks were
  // still alive at exit. Persisted for audit; doesn't gate the
  // transition.
  int32 running_jobs = 2;
}

message MarkIdleResponse {}
